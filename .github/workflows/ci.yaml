name: Quality

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build quality container
        run: docker compose -f compose.test.yaml build php-fpm

      - name: Composer validate
        run: |
          set -euo pipefail
          docker compose -f compose.test.yaml run --rm php-fpm \
            bash -lc "cd /app/src && composer validate --no-check-publish"

      - name: PHP lint
        run: |
          set -euo pipefail
          docker compose -f compose.test.yaml run --rm php-fpm \
            bash -lc "cd /app/src && find app -type f -name '*.php' -print0 | xargs -0 -n1 php -l >/dev/null && php -l www/index.php >/dev/null"

      - name: PHPCS
        run: |
          set -euo pipefail
          docker compose -f compose.test.yaml run --rm php-fpm \
            bash -lc "cd /app/src && ./vendor/bin/phpcs"

      - name: PHPStan
        run: |
          set -euo pipefail
          docker compose -f compose.test.yaml run --rm php-fpm \
            bash -lc "cd /app/src && curl -LsS https://github.com/phpstan/phpstan/releases/latest/download/phpstan.phar -o /tmp/phpstan.phar && XDEBUG_MODE=off php /tmp/phpstan.phar analyse --configuration=phpstan.neon.dist --no-progress"

  lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: build/test/Dockerfile
          ignore: "DL3018,DL4006,SC2028"
